<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="ui">
    <div>Score: <span id="score">0</span> | Level: <span id="level">1</span></div>
    <div>Speed: <span id="speedVal">120</span> ms</div>
    <input type="range" id="speedControl" min="60" max="200" value="120">
    <div>Press SPACE to Pause</div>
</div>

<canvas id="game" width="400" height="400"></canvas>

<script src="./script.js"></script>

</body>
</html>
